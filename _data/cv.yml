      - name: Computational Thermoelectric Generator Model Study & Optimization
        summary: Developed a computational model of a polymer-based Thermoelectric Generator (TEG) using COMSOL Multiphysics to evaluate performance under thermal conditions typical of aircraft flight scenarios.
        end_date: 2025-06-19
        highlights:
          - "Coupled Heat Transfer in Solids and Electrical Circuit physics interfaces."
          - "Re-designed the base model into a Segmented TEG (STEG) incorporating Skutterudite."
          - "Applied bound-constrained optimization algorithms to maximize thermal conversion efficiency."

          
      - name: Automated Measurement System for Flow Rate Sensor Calibration
        summary: Architected a LabVIEW solution utilizing Finite State Automata and Producer-Consumer paradigms to fully automate the calibration procedure for flow rate sensors.
        end_date: 2025-11-06
        highlights:
          - "Developed Arduino firmware to sample measurements from a reference digital flow rate sensor."
          - "Designed the signal conditioning circuit for acquiring the analog Device Under Test (DUT) output."
          - "Automated the generation of prototype Digital Calibration Certificates (DCC) upon procedure completion, significantly streamlining post-test documentation."

      - name: Bridgeless Boost PFC Converter Control Strategies Comparison
        summary: Evaluated the performance of three distinct control strategies for the Bridgeless Boost PFC Converter (BBC) through averaged and small-signal modeling techniques.
        end_date: 2026-05-05
        highlights:
          - "Implemented and compared the cascaded PI/PR and Lyapunov-based inner control loops."
          - "Utilized the dynamic phasors approach using an SOGI-PLL."
      
      - name: Reinforcement Learning for Chess Endgames
        summary: Explored Deep Reinforcement Learning to solve the King and Queen versus King endgame, applying a Deep Q-learning (DQN) approach to train an autonomous agent.
        end_date: 2026-05-27
        highlights:
          - "Structured a Curriculum Learning environment to incrementally increase difficulty."
          - "Evaluated and compared FCN and CNN for optimal state evaluation."
          - "Developed the simulation setup using MATLAB and the Reinforcement Learning Toolbox."

